<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friday Tennis</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #3B6D11;
      --green-dark: #27500A;
      --green-light: #EAF3DE;
      --green-mid: #639922;
      --amber-bg: #FAEEDA;
      --amber-text: #854F0B;
      --red-bg: #FAECE7;
      --red-text: #993C1D;
      --radius: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--green); }
    .tagline {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Week nav */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s 0.05s ease both;
    }
    .nav-btn {
      background: #fff;
      border: 1px solid #e0ddd6;
      border-radius: var(--radius);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #efefeb; }
    .week-info { text-align: center; min-width: 200px; }
    .week-label { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .week-date { font-size: 12px; color: #999; margin-top: 2px; }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .stat {
      background: #fff;
      border: 1px solid #e8e6df;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .stat-val { font-size: 24px; font-weight: 700; color: #1a1a1a; }
    .stat-val.green { color: var(--green); }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e8e6df;
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    /* Note */
    .note-display { font-size: 13px; color: #666; font-style: italic; }
    .note-edit-btn {
      font-size: 11px; color: #bbb; background: none; border: none;
      cursor: pointer; font-family: inherit; margin-left: 8px;
    }
    .note-edit-btn:hover { color: #555; }
    .note-textarea {
      width: 100%; border: 1px solid #ddd; border-radius: var(--radius);
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      resize: none; outline: none; margin-top: 6px; color: #1a1a1a;
      background: #fafaf8;
    }
    .note-textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(59,109,17,0.1); }
    .note-save-btn {
      margin-top: 6px; background: none; border: 1px solid #ddd;
      border-radius: var(--radius); padding: 5px 14px; font-size: 12px;
      font-family: inherit; cursor: pointer; color: #666;
    }
    .note-save-btn:hover { background: #f5f4f0; }

    /* Join */
    .input-row { display: flex; gap: 8px; }
    .name-input {
      flex: 1; border: 1px solid #ddd; border-radius: var(--radius);
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      background: #fafaf8; color: #1a1a1a; outline: none;
    }
    .name-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(59,109,17,0.1); }
    .join-btn {
      background: var(--green); color: #fff; border: none;
      border-radius: var(--radius); padding: 10px 20px;
      font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; white-space: nowrap; transition: background 0.15s;
    }
    .join-btn:hover { background: var(--green-dark); }
    .join-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Players */
    .players-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 12px;
    }
    .badge {
      font-size: 11px; font-weight: 700; border-radius: 20px;
      padding: 3px 11px; background: var(--green-light); color: var(--green);
    }
    .badge.warn { background: var(--amber-bg); color: var(--amber-text); }

    .empty-msg { font-size: 14px; color: #bbb; text-align: center; padding: 1.75rem 0; }

    .player-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #f0ede6;
    }
    .player-row:last-child { border-bottom: none; }
    .num { font-size: 12px; color: #ccc; width: 18px; text-align: right; flex-shrink: 0; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--green-light); display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--green); flex-shrink: 0;
    }
    .player-name { flex: 1; font-size: 14px; font-weight: 500; }
    .player-time { font-size: 11px; color: #bbb; }
    .remove-btn {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: #ccc; padding: 0 4px; line-height: 1;
    }
    .remove-btn:hover { color: #c0392b; }

    /* Loading */
    .loading-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 1.5rem 0; color: #bbb; font-size: 13px;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #ddd;
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1a1a1a; color: #fff;
      border-radius: var(--radius); padding: 10px 22px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 400px) {
      .logo { font-size: 26px; }
      .page { padding: 1.5rem 0.75rem 3rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">🎾 Friday <span>Tennis</span></div>
    <div class="tagline">Sign up · See who's coming · No group spam</div>
  </div>

  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">&#8592;</button>
    <div class="week-info">
      <div class="week-label" id="week-label"></div>
      <div class="week-date" id="week-date"></div>
    </div>
    <button class="nav-btn" onclick="changeWeek(1)">&#8594;</button>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Signed up</div>
      <div class="stat-val green" id="count-val">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Courts needed</div>
      <div class="stat-val" id="courts-val">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Organizer notes</div>
    <div id="note-display-area">
      <span class="note-display" id="note-display">No notes yet.</span>
      <button class="note-edit-btn" onclick="showNoteEdit()">edit</button>
    </div>
    <div id="note-edit-area" style="display:none;">
      <textarea class="note-textarea" id="note-input" rows="2" placeholder="e.g. Court 3 & 4 · Bring your own water · Rain → cancelled"></textarea>
      <button class="note-save-btn" onclick="saveNote()">Save note</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">I'm in!</div>
    <div class="input-row">
      <input class="name-input" type="text" id="name-input" placeholder="Your name" maxlength="24"
        onkeydown="if(event.key==='Enter')joinGame()" />
      <button class="join-btn" id="join-btn" onclick="joinGame()">Join +</button>
    </div>
  </div>

  <div class="card">
    <div class="players-header">
      <div class="card-title" style="margin-bottom:0;">Who's coming</div>
      <span class="badge" id="badge">0 players</span>
    </div>
    <div id="players-list">
      <div class="loading-row"><div class="spinner"></div> Loading...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://pfpjmizhymxklqtnzsrz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_x28EnsjsB7MpgtG5jBR9CA_leMEKx2A';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let offset = 0;
  let currentPlayers = [];
  let currentNote = '';

  function getFriday(off) {
    const d = new Date();
    const day = d.getDay();
    const diff = (5 - day + 7) % 7 || 7;
    const f = new Date(d);
    f.setDate(d.getDate() + diff + off * 7);
    f.setHours(0, 0, 0, 0);
    return f;
  }

  function getWeekKey(off) {
    const f = getFriday(off);
    const y = f.getFullYear();
    const m = String(f.getMonth() + 1).padStart(2, '0');
    const d = String(f.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function changeWeek(dir) {
    offset += dir;
    renderHeader();
    loadData();
  }

  function renderHeader() {
    const f = getFriday(offset);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const labels = { '-1': 'Last Friday', '0': 'This Friday', '1': 'Next Friday' };
    document.getElementById('week-label').textContent = labels[String(offset)] || (offset < 0 ? `${Math.abs(offset)} weeks ago` : `In ${offset} weeks`);
    document.getElementById('week-date').textContent = `${days[f.getDay()]}, ${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()}`;
  }

  function renderPlayers() {
    const players = currentPlayers;
    document.getElementById('count-val').textContent = players.length;
    document.getElementById('courts-val').textContent = players.length === 0 ? '—' : Math.ceil(players.length / 4);

    const badge = document.getElementById('badge');
    badge.textContent = `${players.length} player${players.length !== 1 ? 's' : ''}`;
    badge.className = (players.length > 0 && players.length < 4) ? 'badge warn' : 'badge';

    const list = document.getElementById('players-list');
    if (players.length === 0) {
      list.innerHTML = '<p class="empty-msg">No one yet — be the first!</p>';
      return;
    }
    list.innerHTML = players.map((p, i) => {
      const initials = p.name.slice(0, 2).toUpperCase();
      const t = new Date(p.signed_up_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      return `<div class="player-row">
        <div class="num">${i + 1}</div>
        <div class="avatar">${initials}</div>
        <div class="player-name">${escHtml(p.name)}</div>
        <div class="player-time">joined ${t}</div>
        <button class="remove-btn" onclick="removePlayer('${p.id}')" title="Remove">×</button>
      </div>`;
    }).join('');
  }

  function renderNote() {
    document.getElementById('note-display').textContent = currentNote || 'No notes yet.';
  }

  async function loadData() {
    const key = getWeekKey(offset);
    document.getElementById('players-list').innerHTML = '<div class="loading-row"><div class="spinner"></div> Loading...</div>';

    const [{ data: signups }, { data: noteRow }] = await Promise.all([
      db.from('signups').select('*').eq('week_key', key).order('signed_up_at'),
      db.from('notes').select('content').eq('week_key', key).maybeSingle()
    ]);

    currentPlayers = signups || [];
    currentNote = noteRow?.content || '';
    renderPlayers();
    renderNote();
  }

  async function joinGame() {
    const input = document.getElementById('name-input');
    const name = input.value.trim();
    if (!name) { showToast('Please enter your name'); return; }

    const duplicate = currentPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (duplicate) { showToast("You're already signed up!"); return; }

    const btn = document.getElementById('join-btn');
    btn.disabled = true;

    const { data, error } = await db.from('signups').insert({
      week_key: getWeekKey(offset),
      name: name
    }).select().single();

    btn.disabled = false;

    if (error) { showToast('Something went wrong, try again'); return; }

    currentPlayers.push(data);
    input.value = '';
    renderPlayers();
    showToast("You're in! See you Friday 🎾");
  }

  async function removePlayer(id) {
    const { error } = await db.from('signups').delete().eq('id', id);
    if (error) { showToast('Could not remove, try again'); return; }
    currentPlayers = currentPlayers.filter(p => p.id !== id);
    renderPlayers();
    showToast('Removed');
  }

  function showNoteEdit() {
    document.getElementById('note-edit-area').style.display = 'block';
    document.getElementById('note-display-area').style.display = 'none';
    document.getElementById('note-input').value = currentNote;
  }

  async function saveNote() {
    const content = document.getElementById('note-input').value.trim();
    const key = getWeekKey(offset);

    const { error } = await db.from('notes').upsert({ week_key: key, content }, { onConflict: 'week_key' });
    if (error) { showToast('Could not save note'); return; }

    currentNote = content;
    document.getElementById('note-edit-area').style.display = 'none';
    document.getElementById('note-display-area').style.display = '';
    renderNote();
    showToast('Note saved');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  renderHeader();
  loadData();
</script>
</body>
</html>
